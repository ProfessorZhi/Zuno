name: Wave 1 contract freeze

on:
  pull_request:
    paths:
      - "docs/decisions/0003-wave1-cross-module-contract-freeze.md"
      - "docs/decisions/README.md"
      - "docs/governance/wave1-cross-module-contract-registry.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/verify_wave1_contract_freeze.py"
      - "tests/repo/test_wave1_contract_freeze.py"
      - ".github/workflows/wave1-contract-freeze.yml"
  push:
    branches:
      - main
    paths:
      - "docs/decisions/0003-wave1-cross-module-contract-freeze.md"
      - "docs/decisions/README.md"
      - "docs/governance/wave1-cross-module-contract-registry.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/verify_wave1_contract_freeze.py"
      - "tests/repo/test_wave1_contract_freeze.py"
      - ".github/workflows/wave1-contract-freeze.yml"

permissions:
  contents: read

jobs:
  verify-wave1-contract-freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest

      - name: Compile verifier and tests
        run: |
          python -m py_compile tools/scripts/verify_wave1_contract_freeze.py
          python -m py_compile tests/repo/test_wave1_contract_freeze.py

      - name: Verify Wave 1 contract freeze
        run: python tools/scripts/verify_wave1_contract_freeze.py

      - name: Run focused repository tests
        run: pytest -q tests/repo/test_wave1_contract_freeze.py -p no:cacheprovider
