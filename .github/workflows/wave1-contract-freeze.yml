name: Wave 1 contract freeze

on:
  pull_request:
    paths:
      - "docs/decisions/0003-wave1-cross-module-contract-freeze.md"
      - "docs/decisions/README.md"
      - "docs/governance/wave1-cross-module-contract-registry.md"
      - "docs/modules/06-agent-core-planning-control.md"
      - ".agent/modules/06-agent-core-planning-control.md"
      - "docs/modules/09-security.md"
      - ".agent/modules/09-security.md"
      - "docs/modules/11-infrastructure*.md"
      - ".agent/modules/11-infrastructure*.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - ".agent/scripts/verify_agent_system.py"
      - "tools/scripts/verify_wave1_contract_freeze.py"
      - "tools/scripts/verify_infrastructure_target_protocols.py"
      - "tools/scripts/verify_agent_core_target_protocols.py"
      - "tools/scripts/verify_security_target_protocols.py"
      - "tests/repo/test_wave1_contract_freeze.py"
      - "tests/repo/test_infrastructure_target_protocols.py"
      - "tests/repo/test_agent_core_target_protocols.py"
      - "tests/repo/test_security_target_protocols.py"
      - ".github/workflows/wave1-contract-freeze.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wave1-contract-freeze-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge latest main and preserve module routes
        run: |
          git fetch origin main
          set +e
          git merge origin/main --no-commit --no-ff
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "$conflicts" | grep -v -E '^(docs/modules/README.md|\.agent/modules/README.md)$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Unexpected merge conflicts:"
              echo "$unexpected"
              exit 1
            fi
            git checkout --ours docs/modules/README.md .agent/modules/README.md
          fi
          python - <<'PY'
          from pathlib import Path
          import subprocess

          def main_text(path: str) -> str:
              return subprocess.check_output(["git", "show", f"origin/main:{path}"], text=True)

          def section(text: str, heading: str) -> str:
              start = text.index(heading)
              next_heading = text.find("\n## ", start + len(heading))
              if next_heading == -1:
                  return text[start:].rstrip() + "\n"
              return text[start:next_heading].rstrip() + "\n"

          docs_path = Path("docs/modules/README.md")
          docs = docs_path.read_text(encoding="utf-8")
          main_docs = main_text(str(docs_path))
          security_row = next(line for line in main_docs.splitlines() if line.startswith("| 09 |"))
          docs_lines = docs.splitlines()
          docs_lines = [security_row if line.startswith("| 09 |") else line for line in docs_lines]
          docs = "\n".join(docs_lines) + "\n"
          security_section = section(main_docs, "## Security 文档边界")
          if "## Security 文档边界" not in docs:
              anchor = "## Agent 镜像"
              docs = docs.replace(anchor, security_section + "\n" + anchor, 1)
          for command in [
              "python tools/scripts/verify_security_target_protocols.py",
              "pytest -q tests/repo/test_security_target_protocols.py -p no:cacheprovider",
          ]:
              if command not in docs:
                  docs = docs.rstrip() + "\n\n```text\n" + command + "\n```\n"
          docs_path.write_text(docs, encoding="utf-8", newline="\n")

          agent_path = Path(".agent/modules/README.md")
          agent = agent_path.read_text(encoding="utf-8")
          main_agent = main_text(str(agent_path))
          security_row = next(line for line in main_agent.splitlines() if line.startswith("| 09 |"))
          agent_lines = agent.splitlines()
          agent_lines = [security_row if line.startswith("| 09 |") else line for line in agent_lines]
          agent = "\n".join(agent_lines) + "\n"
          security_section = section(main_agent, "## Security Target 镜像")
          if "## Security Target 镜像" not in agent:
              anchor = "专用验证："
              agent = agent.replace(anchor, security_section + "\n" + anchor, 1)
          for command in [
              "python tools/scripts/verify_security_target_protocols.py",
              "pytest -q tests/repo/test_security_target_protocols.py -p no:cacheprovider",
          ]:
              if command not in agent:
                  agent = agent.rstrip() + "\n\n```text\n" + command + "\n```\n"
          agent_path.write_text(agent, encoding="utf-8", newline="\n")
          PY
          git add -A
          git diff --check --cached
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "merge: synchronize Wave 1 Infrastructure with Security baseline"
            git push origin HEAD:agent/design-11-infrastructure
          fi

      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest

      - name: Compile and validate
        run: |
          python -m py_compile tools/scripts/verify_wave1_contract_freeze.py
          python -m py_compile tools/scripts/verify_infrastructure_target_protocols.py
          python -m py_compile tools/scripts/verify_agent_core_target_protocols.py
          python -m py_compile tools/scripts/verify_security_target_protocols.py
          python -m py_compile .agent/scripts/verify_agent_system.py
          python tools/scripts/verify_wave1_contract_freeze.py
          python tools/scripts/verify_infrastructure_target_protocols.py
          python tools/scripts/verify_agent_core_target_protocols.py
          python tools/scripts/verify_security_target_protocols.py
          python .agent/scripts/verify_agent_system.py
          pytest -q \
            tests/repo/test_wave1_contract_freeze.py \
            tests/repo/test_infrastructure_target_protocols.py \
            tests/repo/test_agent_core_target_protocols.py \
            tests/repo/test_security_target_protocols.py \
            -p no:cacheprovider
