name: Temporary Wave 2 architecture integration fixer

on:
  push:
    branches: [agent/wave2-architecture-integration]
    paths:
      - "tools/scripts/finalize_wave2_architecture_integration.py"
      - ".github/workflows/fix-wave2-architecture-integration.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/wave2-architecture-integration
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply deterministic architecture finalization
        run: |
          python tools/scripts/finalize_wave2_architecture_integration.py
          git diff --check
      - name: Commit finalization
        run: |
          if git diff --quiet; then
            echo "No finalization changes required."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add AGENTS.md docs/architecture .agent/architecture tools/scripts/verify_tool_runtime_target_protocols.py .github/workflows/architecture-document-set.yml
            git commit -m "docs: finalize Wave 2 architecture consistency"
            git push origin HEAD:agent/wave2-architecture-integration
          fi
