name: One-time architecture module alignment

on:
  pull_request:
    branches: [main]
  push:
    branches: [docs/architecture-module-realignment]
    paths:
      - "tools/scripts/finalize_architecture_module_alignment.py"
      - ".github/workflows/finalize-architecture-module-alignment.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/architecture-module-realignment
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pytest pyyaml
      - name: Apply deterministic architecture alignment
        run: python tools/scripts/finalize_architecture_module_alignment.py
      - name: Preserve documentation entrypoint compatibility phrase
        run: |
          sed -i 's/本文是 Zuno 十一个逻辑模块的跨模块集成架构/本文是 Zuno 十一模块（十一个逻辑模块）的跨模块集成架构/' docs/architecture/architecture.md
          cp docs/architecture/architecture.md .agent/architecture/architecture.md
      - name: Check whitespace
        run: git diff --check
      - name: Compile validators and tests
        run: |
          python -m py_compile \
            tools/agent/render_architecture.py \
            tools/scripts/verify_architecture_document_set.py \
            tools/scripts/verify_architecture_semantic_alignment.py \
            tests/repo/test_architecture_document_set.py \
            tests/repo/test_architecture_semantic_alignment.py
      - name: Verify architecture document set
        run: python tools/scripts/verify_architecture_document_set.py
      - name: Verify semantic alignment
        run: python tools/scripts/verify_architecture_semantic_alignment.py
      - name: Verify Mermaid rendering and mirrors
        run: python tools/agent/render_architecture.py --check
      - name: Verify documentation entrypoints
        run: python tools/scripts/verify_docs_entrypoints.py
      - name: Verify Agent system routes
        run: python .agent/scripts/verify_agent_system.py
      - name: Capture document boundary diagnostics
        run: |
          set +e
          python .agent/scripts/verify_doc_boundaries.py > architecture-boundary.log 2>&1
          status=$?
          cat architecture-boundary.log
          echo "$status" > architecture-boundary.status
          exit 0
      - name: Upload document boundary diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: architecture-boundary-diagnostics
          path: |
            architecture-boundary.log
            architecture-boundary.status
          if-no-files-found: error
          retention-days: 7
      - name: Enforce document boundary result
        run: test "$(cat architecture-boundary.status)" = "0"
      - name: Run focused architecture tests
        run: |
          pytest -q \
            tests/repo/test_architecture_document_set.py \
            tests/repo/test_architecture_semantic_alignment.py \
            tests/repo/test_docs_entrypoints.py \
            tests/repo/test_agent_core_target_protocols.py \
            tests/repo/test_model_gateway_target_protocols.py \
            tests/repo/test_memory_context_target_protocols.py \
            tests/repo/test_capability_skill_target_protocols.py \
            tests/repo/test_tool_runtime_target_protocols.py \
            tests/repo/test_security_target_protocols.py \
            tests/repo/test_observability_eval_target_protocols.py \
            tests/repo/test_infrastructure_target_protocols.py \
            tests/repo/test_wave1_contract_freeze.py \
            -p no:cacheprovider
      - name: Commit finalized architecture alignment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: realign total architecture with canonical modules"
          git push origin HEAD:docs/architecture-module-realignment
