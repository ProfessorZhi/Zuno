name: Infrastructure target docs

on:
  pull_request:
    paths:
      - "docs/modules/11-infrastructure.md"
      - ".agent/modules/11-infrastructure.md"
      - "docs/modules/11-infrastructure-data-services.md"
      - ".agent/modules/11-infrastructure-data-services.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/verify_infrastructure_target_protocols.py"
      - "tests/repo/test_infrastructure_target_protocols.py"
      - ".github/workflows/infrastructure-target-docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/modules/11-infrastructure.md"
      - ".agent/modules/11-infrastructure.md"
      - "docs/modules/11-infrastructure-data-services.md"
      - ".agent/modules/11-infrastructure-data-services.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/verify_infrastructure_target_protocols.py"
      - "tests/repo/test_infrastructure_target_protocols.py"
      - ".github/workflows/infrastructure-target-docs.yml"

permissions:
  contents: read

jobs:
  verify-infrastructure-target:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest

      - name: Compile verifier and tests
        run: |
          python -m py_compile tools/scripts/verify_infrastructure_target_protocols.py
          python -m py_compile tests/repo/test_infrastructure_target_protocols.py

      - name: Verify Infrastructure target protocols
        run: python tools/scripts/verify_infrastructure_target_protocols.py

      - name: Run focused repository tests
        run: pytest -q tests/repo/test_infrastructure_target_protocols.py -p no:cacheprovider
