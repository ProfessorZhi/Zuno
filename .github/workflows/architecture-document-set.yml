name: Architecture document set

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/architecture/**"
      - ".agent/architecture/**"
      - "docs/modules/**"
      - ".agent/modules/**"
      - "tools/agent/render_architecture.py"
      - "tools/scripts/verify_*_target_protocols.py"
      - "tools/scripts/verify_architecture_document_set.py"
      - "tests/repo/test_*_target_protocols.py"
      - "tests/repo/test_architecture_document_set.py"
      - "tests/repo/test_docs_entrypoints.py"
      - "AGENTS.md"
      - ".agent/system.yaml"
      - ".agent/references/**"
      - ".agent/scripts/**"
  push:
    branches: [main, agent/wave2-architecture-integration]
    paths:
      - "docs/architecture/**"
      - ".agent/architecture/**"
      - "docs/modules/**"
      - ".agent/modules/**"
      - "tools/agent/render_architecture.py"
      - "tools/scripts/verify_*_target_protocols.py"
      - "tools/scripts/verify_architecture_document_set.py"
      - "tests/repo/test_*_target_protocols.py"
      - "tests/repo/test_architecture_document_set.py"
      - "tests/repo/test_docs_entrypoints.py"
      - "AGENTS.md"
      - ".agent/system.yaml"
      - ".agent/references/**"
      - ".agent/scripts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pytest pyyaml
      - name: Compile architecture validators and tests
        run: |
          python -m py_compile \
            tools/agent/render_architecture.py \
            tools/scripts/verify_architecture_document_set.py \
            tests/repo/test_architecture_document_set.py \
            tests/repo/test_docs_entrypoints.py
      - name: Verify canonical architecture document set
        run: python tools/scripts/verify_architecture_document_set.py
      - name: Verify architecture rendering and mirrors
        run: python tools/agent/render_architecture.py --check
      - name: Verify documentation and Agent entrypoints
        run: |
          python tools/scripts/verify_docs_entrypoints.py
          python .agent/scripts/verify_agent_system.py
          python .agent/scripts/verify_doc_boundaries.py
      - name: Run architecture and module focused tests
        run: |
          pytest -q \
            tests/repo/test_architecture_document_set.py \
            tests/repo/test_docs_entrypoints.py \
            tests/repo/test_agent_core_target_protocols.py \
            tests/repo/test_product_surface_target_protocols.py \
            tests/repo/test_model_gateway_target_protocols.py \
            tests/repo/test_memory_context_target_protocols.py \
            tests/repo/test_capability_skill_target_protocols.py \
            tests/repo/test_tool_runtime_target_protocols.py \
            tests/repo/test_security_target_protocols.py \
            tests/repo/test_observability_eval_target_protocols.py \
            tests/repo/test_infrastructure_target_protocols.py \
            tests/repo/test_wave1_contract_freeze.py \
            -p no:cacheprovider
