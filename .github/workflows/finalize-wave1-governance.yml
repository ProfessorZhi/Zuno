name: Finalize Wave 1 architecture governance

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/decisions/0003-wave1-cross-module-contract-freeze.md"
      - "docs/decisions/README.md"
      - "docs/governance/wave1-cross-module-contract-registry.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/finalize_wave1_architecture_governance.py"
      - "tools/scripts/fix_wave1_confirmed_verifier.py"
      - "tools/scripts/verify_wave1_contract_freeze.py"
      - "tools/scripts/verify_infrastructure_target_protocols.py"
      - "tests/repo/test_wave1_contract_freeze.py"
      - "tests/repo/test_infrastructure_target_protocols.py"
      - ".github/workflows/finalize-wave1-governance.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-wave1-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  finalize-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile governance helpers
        run: python -m py_compile tools/scripts/finalize_wave1_architecture_governance.py tools/scripts/fix_wave1_confirmed_verifier.py

      - name: Normalize final Registry state
        run: python tools/scripts/finalize_wave1_architecture_governance.py

      - name: Normalize final validators and focused tests
        run: python tools/scripts/fix_wave1_confirmed_verifier.py

      - name: Commit normalized governance state
        run: |
          git diff --check -- '*.py' '*.yml' '*.yaml'
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/decisions/0003-wave1-cross-module-contract-freeze.md docs/decisions/README.md \
              docs/governance/wave1-cross-module-contract-registry.md docs/modules/README.md .agent/modules/README.md \
              tools/scripts/verify_wave1_contract_freeze.py tools/scripts/verify_infrastructure_target_protocols.py \
              tests/repo/test_wave1_contract_freeze.py tests/repo/test_infrastructure_target_protocols.py
            git commit -m "docs: confirm Wave 1 shared target contracts"
            git push origin HEAD:agent/finalize-wave1-architecture-governance
          fi

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile validators and tests
        run: |
          python -m py_compile \
            tools/scripts/verify_wave1_contract_freeze.py tools/scripts/verify_infrastructure_target_protocols.py \
            tools/scripts/verify_agent_core_target_protocols.py tools/scripts/verify_security_target_protocols.py \
            tools/scripts/verify_model_gateway_target_protocols.py tools/scripts/verify_model_gateway_contract_freeze.py \
            tools/scripts/verify_model_gateway_operations_conformance.py tools/scripts/verify_observability_eval_target_protocols.py \
            tools/scripts/verify_docs_entrypoints.py .agent/scripts/verify_agent_system.py .agent/scripts/verify_doc_boundaries.py \
            tests/repo/test_wave1_contract_freeze.py tests/repo/test_infrastructure_target_protocols.py \
            tests/repo/test_agent_core_target_protocols.py tests/repo/test_security_target_protocols.py \
            tests/repo/test_model_gateway_target_protocols.py tests/repo/test_model_gateway_contract_freeze.py \
            tests/repo/test_model_gateway_operations_conformance.py tests/repo/test_observability_eval_target_protocols.py \
            tests/repo/test_docs_entrypoints.py

      - name: Verify Wave 1 shared contracts
        run: python tools/scripts/verify_wave1_contract_freeze.py
      - name: Verify Infrastructure
        run: python tools/scripts/verify_infrastructure_target_protocols.py
      - name: Verify Agent Core
        run: python tools/scripts/verify_agent_core_target_protocols.py
      - name: Verify Security
        run: python tools/scripts/verify_security_target_protocols.py
      - name: Verify Model Gateway Target
        run: python tools/scripts/verify_model_gateway_target_protocols.py
      - name: Verify Model Gateway Contract Freeze
        run: python tools/scripts/verify_model_gateway_contract_freeze.py
      - name: Verify Model Gateway Operations Conformance
        run: python tools/scripts/verify_model_gateway_operations_conformance.py
      - name: Verify Observability Eval
        run: python tools/scripts/verify_observability_eval_target_protocols.py
      - name: Verify entrypoints and Agent System
        run: |
          python tools/scripts/verify_docs_entrypoints.py
          python .agent/scripts/verify_agent_system.py
          python .agent/scripts/verify_doc_boundaries.py

      - name: Test Wave 1 shared contracts
        run: pytest -q tests/repo/test_wave1_contract_freeze.py -p no:cacheprovider
      - name: Test Infrastructure
        run: pytest -q tests/repo/test_infrastructure_target_protocols.py -p no:cacheprovider
      - name: Test Agent Core
        run: pytest -q tests/repo/test_agent_core_target_protocols.py -p no:cacheprovider
      - name: Test Security
        run: pytest -q tests/repo/test_security_target_protocols.py -p no:cacheprovider
      - name: Test Model Gateway Target
        run: pytest -q tests/repo/test_model_gateway_target_protocols.py -p no:cacheprovider
      - name: Test Model Gateway Contract Freeze
        run: pytest -q tests/repo/test_model_gateway_contract_freeze.py -p no:cacheprovider
      - name: Test Model Gateway Operations Conformance
        run: pytest -q tests/repo/test_model_gateway_operations_conformance.py -p no:cacheprovider
      - name: Test Observability Eval
        run: pytest -q tests/repo/test_observability_eval_target_protocols.py -p no:cacheprovider
      - name: Test documentation entrypoints
        run: pytest -q tests/repo/test_docs_entrypoints.py -p no:cacheprovider
