name: Observability Eval Target Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/modules/10-observability-eval.md"
      - ".agent/modules/10-observability-eval.md"
      - "docs/modules/10-observability-eval-rag-agent-evaluation.md"
      - ".agent/modules/10-observability-eval-rag-agent-evaluation.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "docs/decisions/0003-wave1-cross-module-contract-freeze.md"
      - "docs/governance/wave1-cross-module-contract-registry.md"
      - "tools/scripts/normalize_confirmed_wave1_registry.py"
      - "tools/scripts/verify_observability_eval_target_protocols.py"
      - "tools/scripts/verify_wave1_contract_freeze.py"
      - "tests/repo/test_observability_eval_target_protocols.py"
      - "tests/repo/test_wave1_contract_freeze.py"
      - ".github/workflows/observability-eval-target-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: observability-eval-target-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout integrated repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Normalize confirmed registry
        run: |
          set -o pipefail
          python -m py_compile tools/scripts/normalize_confirmed_wave1_registry.py
          python tools/scripts/normalize_confirmed_wave1_registry.py
          git diff --check -- '*.py' '*.yml' '*.yaml'
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/governance/wave1-cross-module-contract-registry.md
            git commit -m "docs: normalize confirmed Wave 1 registry"
            git push origin HEAD:agent/finalize-wave1-governance
          fi

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Validate Observability and Wave 1 integration
        run: |
          set -o pipefail
          python -m py_compile \
            tools/scripts/verify_observability_eval_target_protocols.py \
            tools/scripts/verify_wave1_contract_freeze.py \
            tests/repo/test_observability_eval_target_protocols.py \
            tests/repo/test_wave1_contract_freeze.py
          python tools/scripts/verify_observability_eval_target_protocols.py
          cmp docs/modules/10-observability-eval.md .agent/modules/10-observability-eval.md
          cmp docs/modules/10-observability-eval-rag-agent-evaluation.md .agent/modules/10-observability-eval-rag-agent-evaluation.md
          python tools/scripts/verify_docs_entrypoints.py
          python .agent/scripts/verify_agent_system.py
          python .agent/scripts/verify_doc_boundaries.py
          python tools/scripts/verify_wave1_contract_freeze.py
          python tools/scripts/verify_infrastructure_target_protocols.py
          python tools/scripts/verify_agent_core_target_protocols.py
          python tools/scripts/verify_security_target_protocols.py
          python tools/scripts/verify_model_gateway_target_protocols.py
          python tools/scripts/verify_model_gateway_contract_freeze.py
          python tools/scripts/verify_model_gateway_operations_conformance.py
          pytest -q \
            tests/repo/test_observability_eval_target_protocols.py \
            tests/repo/test_docs_entrypoints.py \
            tests/repo/test_wave1_contract_freeze.py \
            tests/repo/test_infrastructure_target_protocols.py \
            tests/repo/test_agent_core_target_protocols.py \
            tests/repo/test_security_target_protocols.py \
            tests/repo/test_model_gateway_target_protocols.py \
            tests/repo/test_model_gateway_contract_freeze.py \
            tests/repo/test_model_gateway_operations_conformance.py \
            -p no:cacheprovider
