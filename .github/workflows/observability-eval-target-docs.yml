name: Observability Eval Target Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/modules/10-observability-eval.md"
      - ".agent/modules/10-observability-eval.md"
      - "docs/modules/10-observability-eval-rag-agent-evaluation.md"
      - ".agent/modules/10-observability-eval-rag-agent-evaluation.md"
      - "tools/scripts/align_observability_wave1.py"
      - "tools/scripts/verify_observability_eval_target_protocols.py"
      - "tests/repo/test_observability_eval_target_protocols.py"
      - ".github/workflows/observability-eval-target-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: observability-eval-target-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  align-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply Wave 1 alignment
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/scripts/align_observability_wave1.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '    if count != 1:\n        raise RuntimeError(f"{label}: expected one occurrence, got {count}")\n    return text.replace(old, new, 1)',
              '    if count == 0:\n        print(f"SKIP {label}: source already aligned or wording changed")\n        return text\n    if count > 1:\n        raise RuntimeError(f"{label}: expected at most one occurrence, got {count}")\n    return text.replace(old, new, 1)',
              1,
          )
          path.write_text(text, encoding="utf-8", newline="\n")
          PY
          python -m py_compile tools/scripts/align_observability_wave1.py
          python tools/scripts/align_observability_wave1.py
          git add docs/modules/10-observability-eval.md \
            .agent/modules/10-observability-eval.md \
            docs/modules/10-observability-eval-rag-agent-evaluation.md \
            .agent/modules/10-observability-eval-rag-agent-evaluation.md \
            tools/scripts/verify_observability_eval_target_protocols.py \
            tests/repo/test_observability_eval_target_protocols.py
          git diff --check --cached
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "docs: align Observability with Wave 1 contracts"
            git push origin HEAD:agent/integrate-10-observability-eval
          fi

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Validate aligned architecture
        run: |
          python -m py_compile tools/scripts/verify_observability_eval_target_protocols.py tests/repo/test_observability_eval_target_protocols.py
          python tools/scripts/verify_observability_eval_target_protocols.py
          cmp docs/modules/10-observability-eval.md .agent/modules/10-observability-eval.md
          cmp docs/modules/10-observability-eval-rag-agent-evaluation.md .agent/modules/10-observability-eval-rag-agent-evaluation.md
          python tools/scripts/verify_docs_entrypoints.py
          python .agent/scripts/verify_agent_system.py
          python .agent/scripts/verify_doc_boundaries.py
          pytest -q tests/repo/test_observability_eval_target_protocols.py tests/repo/test_docs_entrypoints.py -p no:cacheprovider
