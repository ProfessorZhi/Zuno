name: Observability Eval Target Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/modules/10-observability-eval.md"
      - ".agent/modules/10-observability-eval.md"
      - "docs/modules/10-observability-eval-rag-agent-evaluation.md"
      - ".agent/modules/10-observability-eval-rag-agent-evaluation.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/verify_observability_eval_target_protocols.py"
      - "tests/repo/test_observability_eval_target_protocols.py"
      - ".github/workflows/observability-eval-target-docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/modules/10-observability-eval.md"
      - ".agent/modules/10-observability-eval.md"
      - "docs/modules/10-observability-eval-rag-agent-evaluation.md"
      - ".agent/modules/10-observability-eval-rag-agent-evaluation.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/verify_observability_eval_target_protocols.py"
      - "tests/repo/test_observability_eval_target_protocols.py"
      - ".github/workflows/observability-eval-target-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: observability-eval-target-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Observability and Eval target contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Verify executable and workflow diff formatting
        run: git diff --check origin/main...HEAD -- '*.py' '*.yml' '*.yaml'

      - name: Compile verifier and tests
        run: |
          python -m py_compile \
            tools/scripts/verify_observability_eval_target_protocols.py \
            tests/repo/test_observability_eval_target_protocols.py

      - name: Verify Observability and Eval target protocols
        run: python tools/scripts/verify_observability_eval_target_protocols.py

      - name: Verify formal and Agent mirror bytes
        run: |
          cmp docs/modules/10-observability-eval.md .agent/modules/10-observability-eval.md
          cmp \
            docs/modules/10-observability-eval-rag-agent-evaluation.md \
            .agent/modules/10-observability-eval-rag-agent-evaluation.md

      - name: Verify documentation entrypoints and boundaries
        run: |
          python tools/scripts/verify_docs_entrypoints.py
          python .agent/scripts/verify_agent_system.py
          python .agent/scripts/verify_doc_boundaries.py

      - name: Run focused repository tests
        run: |
          pytest -q \
            tests/repo/test_observability_eval_target_protocols.py \
            tests/repo/test_docs_entrypoints.py \
            -p no:cacheprovider
