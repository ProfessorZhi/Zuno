name: Observability Eval Target Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/modules/10-observability-eval.md"
      - ".agent/modules/10-observability-eval.md"
      - "docs/modules/10-observability-eval-rag-agent-evaluation.md"
      - ".agent/modules/10-observability-eval-rag-agent-evaluation.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "tools/scripts/align_observability_wave1.py"
      - "tools/scripts/verify_observability_eval_target_protocols.py"
      - "tests/repo/test_observability_eval_target_protocols.py"
      - ".github/workflows/observability-eval-target-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: observability-eval-target-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  align-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge latest main and apply Wave 1 alignment
        run: |
          git fetch origin main
          set +e
          git merge origin/main --no-commit --no-ff
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "$conflicts" | grep -v -E '^(docs/modules/README.md|\.agent/modules/README.md|\.github/workflows/model-gateway-target-docs.yml)$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Unexpected merge conflicts:"
              echo "$unexpected"
              exit 1
            fi
            git checkout --theirs docs/modules/README.md .agent/modules/README.md .github/workflows/model-gateway-target-docs.yml
          fi
          python -m py_compile tools/scripts/align_observability_wave1.py
          python tools/scripts/align_observability_wave1.py
          git add -A
          git diff --check --cached
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "merge: align Observability with Wave 1 contract baseline"
          git push origin HEAD:agent/integrate-10-observability-eval

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Validate aligned architecture
        run: |
          python -m py_compile tools/scripts/verify_observability_eval_target_protocols.py tests/repo/test_observability_eval_target_protocols.py
          python tools/scripts/verify_observability_eval_target_protocols.py
          cmp docs/modules/10-observability-eval.md .agent/modules/10-observability-eval.md
          cmp docs/modules/10-observability-eval-rag-agent-evaluation.md .agent/modules/10-observability-eval-rag-agent-evaluation.md
          python tools/scripts/verify_docs_entrypoints.py
          python .agent/scripts/verify_agent_system.py
          python .agent/scripts/verify_doc_boundaries.py
          python tools/scripts/verify_wave1_contract_freeze.py
          python tools/scripts/verify_infrastructure_target_protocols.py
          python tools/scripts/verify_agent_core_target_protocols.py
          python tools/scripts/verify_security_target_protocols.py
          python tools/scripts/verify_model_gateway_target_protocols.py
          pytest -q \
            tests/repo/test_observability_eval_target_protocols.py \
            tests/repo/test_docs_entrypoints.py \
            tests/repo/test_wave1_contract_freeze.py \
            tests/repo/test_infrastructure_target_protocols.py \
            tests/repo/test_agent_core_target_protocols.py \
            tests/repo/test_security_target_protocols.py \
            tests/repo/test_model_gateway_target_protocols.py \
            -p no:cacheprovider
