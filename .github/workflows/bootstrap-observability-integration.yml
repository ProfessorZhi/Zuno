name: Bootstrap Observability Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/bootstrap-observability-integration.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-observability-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Import reviewed Observability proposal
        run: |
          set -euo pipefail
          git fetch origin agent/refine-10-observability-eval
          git checkout origin/agent/refine-10-observability-eval -- \
            docs/modules/10-observability-eval.md \
            .agent/modules/10-observability-eval.md \
            docs/modules/10-observability-eval-rag-agent-evaluation.md \
            .agent/modules/10-observability-eval-rag-agent-evaluation.md \
            docs/modules/README.md \
            .agent/modules/README.md \
            tools/scripts/verify_observability_eval_target_protocols.py \
            tests/repo/test_observability_eval_target_protocols.py \
            .github/workflows/observability-eval-target-docs.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: integrate Observability and Eval target architecture"
          git push origin HEAD:agent/integrate-10-observability-eval
