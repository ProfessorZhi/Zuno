name: Agent Core Target Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/modules/06-agent-core-*.md"
      - ".agent/modules/06-agent-core-*.md"
      - "docs/modules/README.md"
      - ".agent/modules/README.md"
      - "AGENTS.md"
      - ".agent/system.yaml"
      - ".agent/scripts/verify_agent_system.py"
      - ".agent/scripts/verify_doc_boundaries.py"
      - "tools/scripts/verify_agent_core_target_protocols.py"
      - "tools/scripts/verify_docs_entrypoints.py"
      - "tools/scripts/verify_repo_structure.py"
      - "tools/agent/render_architecture.py"
      - "tests/repo/test_agent_core_target_protocols.py"
      - "tests/repo/test_docs_entrypoints.py"
      - ".github/workflows/agent-core-target-docs.yml"
  push:
    branches:
      - "agent/complete-agent-core-target-architecture"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-core-target-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Agent Core target docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile validation scripts
        run: |
          python -m py_compile \
            tools/scripts/verify_agent_core_target_protocols.py \
            tools/scripts/verify_docs_entrypoints.py \
            tools/scripts/verify_repo_structure.py \
            tools/agent/render_architecture.py \
            .agent/scripts/verify_agent_system.py \
            .agent/scripts/verify_doc_boundaries.py \
            tests/repo/test_agent_core_target_protocols.py \
            tests/repo/test_docs_entrypoints.py

      - name: Verify Agent Core target protocols
        run: python tools/scripts/verify_agent_core_target_protocols.py

      - name: Verify Agent System
        if: always()
        run: python .agent/scripts/verify_agent_system.py

      - name: Verify document boundaries
        if: always()
        run: python .agent/scripts/verify_doc_boundaries.py

      - name: Verify repository structure
        if: always()
        run: python tools/scripts/verify_repo_structure.py

      - name: Verify documentation entrypoints
        if: always()
        run: python tools/scripts/verify_docs_entrypoints.py

      - name: Verify architecture renderer outputs
        if: always()
        run: python tools/agent/render_architecture.py --check

      - name: Run Agent Core protocol tests
        if: always()
        run: pytest -q tests/repo/test_agent_core_target_protocols.py -p no:cacheprovider

      - name: Run documentation entrypoint tests
        if: always()
        run: pytest -q tests/repo/test_docs_entrypoints.py -p no:cacheprovider
