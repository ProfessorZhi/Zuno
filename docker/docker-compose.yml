
# 🌐 网络配置
networks:
  agentchat-network:
    driver: bridge

services:
  # PostgreSQL 数据库服务
  postgres:
    container_name: agentchat-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentchat
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentchat"]
      timeout: 20s
      retries: 10

  # Redis缓存服务
  redis:
    image: redis:7.0-alpine
    container_name: agentchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端API服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentchat-backend
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      TZ: Asia/Shanghai
#    volumes:
#      - ../src/backend:/app:cached
#      - ../data:/app/data
#      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./docker_config.local.yaml:/app/agentchat/config.yaml
      - ../cli_tools:/app/cli_tools
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端开发服务
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: agentchat-frontend
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://backend:7860
      TZ: Asia/Shanghai
#    volumes:
#      - ../src/frontend:/app:cached
#      - /app/node_modules
    depends_on:
      - backend
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    container_name: agentchat-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUME_DIRECTORY:-.}/data/minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: on-failure
    networks:
      - agentchat-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

# 数据卷配置
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
