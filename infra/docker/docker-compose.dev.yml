services:
  backend:
    environment:
      ZUNO_CONFIG: /app/zuno/config.yaml
    volumes:
      - ../../src/backend:/app/src/backend:cached
      - ./docker_config.local.yaml:/app/zuno/config.yaml
      - ../../tools/cli:/app/cli_tools:cached
      - ../../tools/scripts:/app/scripts:cached

  frontend:
    build:
      target: frontend-dev
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://backend:7860
    volumes:
      - ../../apps/web:/app:cached
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090"]
