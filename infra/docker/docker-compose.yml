networks:
  agentchat-network:
    driver: bridge

services:
  postgres:
    container_name: agentchat-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentchat
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentchat"]
      interval: 10s
      timeout: 20s
      retries: 10

  redis:
    container_name: agentchat-redis
    image: redis:7.0-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  neo4j:
    container_name: agentchat-neo4j
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j12345
      TZ: Asia/Shanghai
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j12345 'RETURN 1;'"]
      interval: 30s
      timeout: 15s
      retries: 10

  minio:
    container_name: agentchat-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    container_name: agentchat-backend
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      TZ: Asia/Shanghai
      AGENTCHAT_CONFIG: /app/agentchat/config.yaml
      ZUNO_SKILLS_DIR: /app/host_skills
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./docker_config.local.yaml:/app/agentchat/config.yaml:ro
      - backend_vector_db:/app/vector_db
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    container_name: agentchat-frontend
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
  backend_vector_db:
