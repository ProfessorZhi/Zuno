networks:
  agentchat-network:
    driver: bridge

services:
  postgres:
    container_name: agentchat-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentchat
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentchat"]
      interval: 10s
      timeout: 20s
      retries: 10

  redis:
    container_name: agentchat-redis
    image: redis:7.0-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    container_name: agentchat-rabbitmq
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 15s
      retries: 10

  neo4j:
    container_name: agentchat-neo4j
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j12345
      TZ: Asia/Shanghai
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j12345 'RETURN 1;'"]
      interval: 30s
      timeout: 15s
      retries: 10

  elasticsearch:
    container_name: agentchat-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.24
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 30s
      timeout: 15s
      retries: 20

  minio:
    container_name: agentchat-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  etcd:
    container_name: agentchat-etcd
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      TZ: Asia/Shanghai
    volumes:
      - etcd_data:/etcd
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 10

  milvus:
    container_name: agentchat-milvus
    image: milvusdb/milvus:v2.4.15
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 10

  backend:
    container_name: agentchat-backend
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      TZ: Asia/Shanghai
      ZUNO_CONFIG: /app/zuno/config.yaml
      ZUNO_SKILLS_DIR: /app/host_skills
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ./docker_config.local.yaml:/app/zuno/config.yaml:ro
      - backend_vector_db:/app/.local/state/vector_db
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    container_name: agentchat-worker
    image: docker-backend
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "zuno.services.queue.runner"]
    environment:
      TZ: Asia/Shanghai
      ZUNO_CONFIG: /app/zuno/config.yaml
      ZUNO_SKILLS_DIR: /app/host_skills
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ../../src/backend:/app
      - ./docker_config.local.yaml:/app/zuno/config.yaml:ro
      - backend_vector_db:/app/.local/state/vector_db
    networks:
      - agentchat-network

  frontend:
    container_name: agentchat-frontend
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agentchat-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  etcd_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
  elasticsearch_data:
  minio_data:
  backend_vector_db:
