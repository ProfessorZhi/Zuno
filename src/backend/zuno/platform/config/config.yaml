# Copy of config.example.yaml for zuno-first local startup.
# Keep secrets out of git; prefer editing config.local.yaml locally.

server:
  host: "127.0.0.1"
  port: 7860
  project_name: "Zuno"
  version: "2.4.0"

database:
  sync_endpoint: "postgresql+psycopg://postgres:postgres@localhost:5432/zuno"
  async_endpoint: "postgresql+asyncpg://postgres:postgres@localhost:5432/zuno"
  echo: false
  pool_size: 10
  max_overflow: 20

redis:
  endpoint: "redis://localhost:6379"

rabbitmq:
  enabled: false
  url: "amqp://guest:guest@localhost:5672/"
  parse_queue: "knowledge.parse"
  index_queue: "knowledge.index"
  graph_queue: "knowledge.graph"

neo4j:
  enabled: false
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: ""
  database: "neo4j"

multi_models:
  conversation_model:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model_name: "deepseek-v4-flash"

  tool_call_model:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model_name: "deepseek-v4-flash"

  reasoning_model:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model_name: "deepseek-v4-flash"
