# PHASE02 Data Migration and Dual-path Plan
phase_id: PHASE02
task_id: P02-T04
start_commit: 000928c7fc46224264e43677a5877d76731cd04c
status_boundary: "本矩阵不执行数据迁移；它定义 PHASE04+ 的 Expand/Migrate/Verify/Contract 输入。Dual Write 默认禁止，除非任务明确证明必要。"
state_machine:
  states: [SCHEMA_EXPANDED, BACKFILLING, DUAL_READ, DUAL_WRITE_OPTIONAL, READ_CUTOVER, WRITE_CUTOVER, VERIFIED, LEGACY_FROZEN, LEGACY_REMOVED]
  default_dual_write: "forbidden_without_coordinator_decision"
entries:
  - data_owner: "06 Agent Core"
    source: "SQLiteAgentRunStore tables agent_runtime_*"
    target: "PostgreSQL agent domain tables + LangGraph PostgreSQL Checkpointer boundary"
    transform: "serialize current run/checkpoint/event/interrupt/plan/observation records into canonical AgentRun/PlanVersion/Step/Action facts"
    hash: "run_id + plan_version + checkpoint_generation + canonical payload hash"
    backfill_chunk: "by run_id and checkpoint sequence"
    verification: ["row count by run_id", "latest checkpoint generation", "resume/cancel/retry fault test"]
    rollback: "pre-WRITE_CUTOVER read from SQLite/local adapter; after cutover use forward-fix and recovery watermark"
    retention: "keep local adapter only as Developer/CI profile after verified cutover"
    target_phase: "PHASE04/PHASE08"
    removal_task: "P22-T03"
  - data_owner: "01 Product Surface"
    source: "WorkspaceTaskRuntimeService in-memory dicts + SQLite durable ingestion workspace task rows"
    target: "product_commands, runtime_requests, command_receipts, product_projection_events"
    transform: "map WorkspaceTaskContract lifecycle into Product Command/Projection facts without flattening RunOutcome"
    hash: "task_id + command_kind + idempotency_key + payload_hash"
    backfill_chunk: "by workspace_id/task_id"
    verification: ["projection rebuild", "SSE snapshot/delta parity", "approval/action parity"]
    rollback: "adapter returns old WorkspaceTaskLifecycleSnapshot until Product projection verified"
    retention: "projection cursor retention independent from run retention"
    target_phase: "PHASE09/PHASE10"
    removal_task: "P22-T03"
  - data_owner: "02 Input / Document Ingestion"
    source: "SQLiteDurableIngestionStore SourceObject/Parse/Document/Index tables + LocalObjectStore"
    target: "PostgreSQL ingestion domain tables + S3-compatible ObjectRef metadata"
    transform: "copy source object metadata, content hash, parse snapshots, document blocks and handoff manifests"
    hash: "source_object_id + content_sha256 + parse_snapshot_hash"
    backfill_chunk: "by workspace_id/source_object_id"
    verification: ["hash readback", "parser snapshot quality", "handoff idempotency"]
    rollback: "read from local object/store before READ_CUTOVER; quarantine mismatched hashes"
    retention: "raw SourceObject retained according to policy"
    target_phase: "PHASE04/PHASE11"
    removal_task: "P22-T03"
  - data_owner: "03 Knowledge"
    source: "KnowledgeIndexRuntime local bm25/vector/graph-shaped indexes"
    target: "KnowledgeVersion, IndexManifest, external index adapters as rebuildable projections"
    transform: "rebuild from accepted document/version manifests; do not migrate derived index as source fact"
    hash: "knowledge_version + index_manifest_hash + source_span_hash"
    backfill_chunk: "by knowledge_space_id/index_manifest"
    verification: ["representative query", "citation lineage", "index visibility receipt"]
    rollback: "serve previous accepted KnowledgeVersion until new cutover verified"
    retention: "derived indexes can be rebuilt; source lineage retained"
    target_phase: "PHASE12"
    removal_task: "P22-T03"
  - data_owner: "08 Tool Runtime"
    source: "SQLite runtime tool claims + workspace pending tool requests"
    target: "PreparedToolAction, ToolAttempt, EffectReceipt, EffectReconciliation, IdempotencyClaim"
    transform: "map existing idempotency claims and approval interruptions into immutable action/effect records where evidence exists"
    hash: "prepared_action_canonical_hash + target_resource_hash + idempotency_key"
    backfill_chunk: "by run_id/action_id"
    verification: ["duplicate claim", "approval hash binding", "UNKNOWN reconciliation fault"]
    rollback: "read-only gateway can roll back before side-effect cutover; side-effect results require reconciliation"
    retention: "UNKNOWN and reconciliation history immutable"
    target_phase: "PHASE15/PHASE16"
    removal_task: "P22-T03"
  - data_owner: "10 Observability & Eval"
    source: "SQLiteLocalTraceStore and local eval artifacts"
    target: "append-only telemetry/audit/eval facts + evidence registry"
    transform: "append source events with canonical envelope, sequence, redaction and artifact hash"
    hash: "event_id + source_sequence + redacted_payload_hash"
    backfill_chunk: "by trace_id/event_sequence"
    verification: ["dedup", "gap detection", "projection rebuild", "release gate blocked-not-measured preservation"]
    rollback: "external sink delivery rollback does not modify source trace facts"
    retention: "legal hold and redaction policies apply"
    target_phase: "PHASE06/PHASE20"
    removal_task: "P22-T03"
greenfield:
  - owner: "09 Security"
    target: "Principal, Scope, EffectiveSecurityEpoch, ApprovalDecision, SecretLease, RedactionPolicy"
    reason: "PHASE01 found Target contracts but no equivalent authoritative current domain tables."
    target_phase: "PHASE05"
  - owner: "11 Infrastructure"
    target: "OutboxRecord, InboxRecord, WorkerLease, FencingToken, RecoveryWatermark, BackupRun"
    reason: "PHASE01 found local/fake infrastructure evidence only."
    target_phase: "PHASE04"
