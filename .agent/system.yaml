version: 1

purpose: "Route Zuno tasks to local skills, templates, Target docs, Programs, and verification."

system_identity:
  name: "Zuno Local Agent Skill System"
  bootloader: "AGENTS.md"
  local_skills_root: ".agent/references"
  template_root: ".agent/templates"
  active_program_root: ".agent/programs"
  architecture_mirror_root: ".agent/architecture"
  module_mirror_root: ".agent/modules"
  formal_truth_root: "docs"
  formal_architecture_root: "docs/architecture"
  formal_module_root: "docs/modules"
  formal_status_root: "docs/status"
  history_root: "docs/history"

program_rules:
  current_program_root: ".agent/programs"
  phase_filename_pattern: "PHASE[0-9][0-9]_<name>.md"
  new_program_first_phase: "PHASE01"
  replaced_program_policy: "remove replaced active phase files; archive evidence under docs/history/programs"

work_modes:
  runtime_boundary: "parallel agents are engineering workflow helpers; Zuno product runtime target remains a Single Controller Agent Runtime"
  branch_prefix: "codex/"
  persistent_thread_slots: true
  task_isolation_unit: "worktree + branch, not thread title"
  main_thread_can_self_execute: true
  main_thread_can_delegate: true
  prompt_only_is_not_goal_mode: true
  hangup_mode:
    main_thread_goal_mode: true
    allow_multi_agent_inside_main_thread: true
    verification_owner: "main thread"
  multi_thread_mode:
    coordinator_thread_goal_mode: true
    coordinator_role: "prepare child prompts, scopes, acceptance gates, progress tracking, diff review, integrated verification, and merge"
    child_thread_goal_mode: "user-created Codex UI goal mode thread required"
    require_fresh_or_confirmed_worktree_branch_per_task: true
    prefer_reuse_existing_thread_slots: true
    thread_prompt_root: ".agent/programs/thread-prompts"
    coarse_grained_child_tasks: true
    require_disjoint_write_scope: true
    require_commit_and_push_before_merge: true
    merge_owner: "main coordinator thread"

architecture_directory_contract:
  formal_files:
    - "docs/architecture/README.md"
    - "docs/architecture/architecture.md"
    - "docs/architecture/architecture-views.md"
    - "docs/architecture/architecture.html"
  mirror_files:
    - ".agent/architecture/README.md"
    - ".agent/architecture/architecture.md"
    - ".agent/architecture/architecture-views.md"
    - ".agent/architecture/architecture.html"
  forbidden_content:
    - "module design"
    - "production readiness"
    - "ADR"
    - "program plan"
    - "repo ownership matrix"

module_document_contract:
  formal_index: "docs/modules/README.md"
  agent_index: ".agent/modules/README.md"
  status_truth: "docs/status/production-readiness.md"
  model_gateway:
    formal:
      - "docs/modules/04-model-gateway.md"
    mirror:
      - ".agent/modules/04-model-gateway.md"
    target_only: true
    verifier: "python tools/scripts/verify_model_gateway_target_protocols.py"
    test: "pytest -q tests/repo/test_model_gateway_target_protocols.py -p no:cacheprovider"
  agent_core:
    formal:
      - "docs/modules/06-agent-core-planning-control.md"
    mirror:
      - ".agent/modules/06-agent-core-planning-control.md"
    target_only: true
    execution_plan_root: ".agent/programs"
    normative_order:
      - "global architecture principles"
      - "Agent Core unified target architecture document"
      - "Program"
      - "code and migration"
    verifier: "python tools/scripts/verify_agent_core_target_protocols.py"
    test: "pytest -q tests/repo/test_agent_core_target_protocols.py -p no:cacheprovider"

skill_file_contract:
  recommended_sections:
    - "When To Use"
    - "Mental Model"
    - "Current Truth"
    - "Target Direction"
    - "Must Preserve"
    - "Before Editing"
    - "Allowed Changes"
    - "Forbidden Changes"
    - "Common Failure Patterns"
    - "Debug Playbooks"
    - "Focused Tests"
    - "Docs Sync"
    - "Lessons Learned"

template_rules:
  purpose: "execution skeletons only"
  forbidden_content:
    - "project knowledge"
    - "current architecture truth"
    - "target architecture prose"
    - "lessons learned"
    - "debug playbooks"

skill_routes:
  - name: "docs-agent-system-history"
    match:
      paths:
        - "README.md"
        - "docs/**"
        - "AGENTS.md"
        - ".agent/**"
    skills:
      - ".agent/references/project-map.md"
      - ".agent/references/task-routing.md"
      - ".agent/references/workflow.md"
      - ".agent/references/docs-map.md"
      - ".agent/references/architecture-docs-map.md"
      - ".agent/references/documentation-governance.md"
      - ".agent/references/architecture-update-policy.md"
      - ".agent/references/diagram-inventory.md"
      - ".agent/references/current-target-future-rules.md"
      - ".agent/references/workflow-governance.md"
      - ".agent/references/workflow-update-policy.md"
      - ".agent/references/workflow-requirements.md"
      - ".agent/references/workflow-change-log.md"
      - ".agent/references/workflow-maintenance-checklist.md"
      - ".agent/references/verification-map.md"
      - ".agent/references/known-pitfalls.md"
      - ".agent/references/zuno-repo-hygiene.md"
    templates:
      - ".agent/templates/requirement-intake.md"
      - ".agent/templates/readonly-audit-prompt.md"
      - ".agent/templates/phase-plan.md"
      - ".agent/templates/phase-closure-report.md"
      - ".agent/templates/goal-mode-prompt.md"
      - ".agent/templates/target-mode-prompt.md"
      - ".agent/templates/codex-batch-prompt.md"
      - ".agent/templates/spec-coding-checklist.md"
      - ".agent/templates/architecture-doc-template.md"
      - ".agent/templates/mermaid-diagram-template.md"
      - ".agent/templates/architecture-change-note-template.md"
      - ".agent/templates/verification-report-template.md"
      - ".agent/templates/workflow-change-note-template.md"
    docs_sync:
      - "AGENTS.md"
      - "README.md"
      - "docs/README.md"
      - "docs/architecture/README.md"
      - "docs/architecture/architecture.md"
      - "docs/architecture/architecture-views.md"
      - "docs/architecture/architecture.html"
      - "docs/modules/README.md"
      - "docs/modules/02-input-document-ingestion.md"
      - "docs/modules/03-knowledge-agentic-graphrag.md"
      - "docs/modules/04-model-gateway.md"
      - "docs/modules/05-memory-context.md"
      - "docs/modules/06-agent-core-planning-control.md"
      - "docs/modules/07-capability-skill.md"
      - "docs/modules/10-observability-eval.md"
      - "docs/status/production-readiness.md"
      - "docs/decisions/README.md"
      - "docs/governance/repo-ownership-matrix.md"
      - ".agent/README.md"
      - ".agent/system.yaml"
      - ".agent/architecture/README.md"
      - ".agent/architecture/architecture.md"
      - ".agent/architecture/architecture-views.md"
      - ".agent/architecture/architecture.html"
      - ".agent/modules/README.md"
      - ".agent/modules/04-model-gateway.md"
      - ".agent/modules/06-agent-core-planning-control.md"
      - ".agent/references/docs-map.md"
      - ".agent/references/architecture-docs-map.md"
      - ".agent/references/documentation-governance.md"
      - ".agent/references/architecture-update-policy.md"
      - ".agent/references/current-target-future-rules.md"
      - ".agent/references/workflow.md"
      - ".agent/references/verification-map.md"
      - ".agent/programs/README.md"
      - ".agent/programs/current.md"
      - ".agent/programs/implementation-roadmap.md"
      - ".agent/programs/closure-checklist.md"
    verify:
      - "git diff --check"
      - "python tools/agent/render_architecture.py --check"
      - "python tools/scripts/verify_docs_entrypoints.py"
      - "python tools/scripts/verify_current_program.py"
      - "python tools/scripts/verify_repo_structure.py"
      - "python tools/scripts/verify_model_gateway_target_protocols.py"
      - "python tools/scripts/verify_agent_core_target_protocols.py"
      - "python .agent/scripts/verify_agent_system.py"
      - "python .agent/scripts/verify_doc_boundaries.py"
      - "pytest -q tests/repo/test_model_gateway_target_protocols.py -p no:cacheprovider"
      - "pytest -q tests/repo/test_docs_entrypoints.py tests/repo/test_agent_core_target_protocols.py -p no:cacheprovider"

  - name: "backend-agent-runtime"
    match:
      paths:
        - "src/backend/zuno/core/agents/**"
        - "src/backend/zuno/agent/**"
        - "src/backend/zuno/services/memory/**"
        - "src/backend/zuno/memory/**"
    skills:
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/code-map.md"
      - ".agent/references/zuno-repo-hygiene.md"
      - ".agent/references/verification-map.md"
    templates:
      - ".agent/templates/spec-coding-checklist.md"
      - ".agent/templates/phase-closure-report.md"
    docs_sync:
      - "docs/architecture/architecture.md"
      - "docs/modules/05-memory-context.md"
      - "docs/modules/06-agent-core-planning-control.md"
      - "docs/status/production-readiness.md"
      - ".agent/architecture/architecture.md"
      - ".agent/modules/06-agent-core-planning-control.md"
      - ".agent/references/code-map.md"
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/verification-map.md"
    verify:
      - "python tools/scripts/verify_agent_core_target_protocols.py"
      - "pytest -q tests/repo/test_agent_core_target_protocols.py -p no:cacheprovider"
      - "python .agent/scripts/verify_module_boundaries.py"

  - name: "capability-tool-retrieval"
    match:
      paths:
        - "src/backend/zuno/platform/services/application/capabilities/**"
        - "src/backend/zuno/platform/services/capability_registry.py"
        - "src/backend/zuno/capability/**"
    skills:
      - ".agent/references/code-map.md"
      - ".agent/references/verification-map.md"
    templates:
      - ".agent/templates/spec-coding-checklist.md"
    docs_sync:
      - "docs/architecture/architecture.md"
      - "docs/modules/03-knowledge-agentic-graphrag.md"
      - "docs/modules/07-capability-skill.md"
      - ".agent/architecture/architecture.md"
      - ".agent/references/code-map.md"
    verify:
      - "pytest -q tests/agent/test_capability_system.py tests/agent/test_capability_registry.py -p no:cacheprovider"

  - name: "knowledge-graphrag-retrieval"
    match:
      paths:
        - "src/backend/zuno/services/rag/**"
        - "src/backend/zuno/services/retrieval/**"
        - "src/backend/zuno/services/graphrag/**"
        - "src/backend/zuno/knowledge/**"
    skills:
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/code-map.md"
      - ".agent/references/verification-map.md"
      - ".agent/references/known-pitfalls.md"
    templates:
      - ".agent/templates/spec-coding-checklist.md"
      - ".agent/templates/phase-closure-report.md"
    docs_sync:
      - "docs/architecture/architecture.md"
      - "docs/modules/02-input-document-ingestion.md"
      - "docs/modules/03-knowledge-agentic-graphrag.md"
      - "docs/status/production-readiness.md"
      - ".agent/architecture/architecture.md"
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/verification-map.md"
    verify:
      - "pytest -q tests/agent/test_knowledge_graphrag_runtime_contracts.py -p no:cacheprovider"

  - name: "platform-foundation"
    match:
      paths:
        - "src/backend/zuno/platform/**"
    skills:
      - ".agent/references/code-map.md"
      - ".agent/references/verification-map.md"
      - ".agent/references/zuno-repo-hygiene.md"
    templates:
      - ".agent/templates/spec-coding-checklist.md"
      - ".agent/templates/phase-closure-report.md"
    docs_sync:
      - "docs/architecture/architecture.md"
      - "docs/status/production-readiness.md"
      - "docs/governance/repo-ownership-matrix.md"
      - ".agent/architecture/architecture.md"
      - ".agent/references/code-map.md"
      - ".agent/references/verification-map.md"
    verify:
      - "pytest -q tests/agent/test_platform_layer_surfaces.py tests/repo/test_backend_facade_layers.py -p no:cacheprovider"

stop_conditions:
  - "public API field rename"
  - "database schema change"
  - "dependency upgrade"
  - "security boundary change"
  - "Target behavior promoted to Current without evidence"
  - "architecture principle changed by an implementation task"
