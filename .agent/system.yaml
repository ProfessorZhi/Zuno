version: 2

purpose: "Route Zuno tasks to the eleven canonical module architectures, total architecture, Programs, and verification."

system_identity:
  name: "Zuno Local Agent Skill System"
  bootloader: "AGENTS.md"
  local_skills_root: ".agent/references"
  template_root: ".agent/templates"
  active_program_root: ".agent/programs"
  architecture_mirror_root: ".agent/architecture"
  module_mirror_root: ".agent/modules"
  formal_truth_root: "docs"
  formal_architecture_root: "docs/architecture"
  formal_module_root: "docs/modules"
  formal_status_root: "docs/status"
  history_root: "docs/history"

runtime_boundary:
  product_runtime: "Single Controller Agent Runtime"
  engineering_parallelism: "parallel agents are engineering workflow helpers and do not change the product runtime architecture"

program_rules:
  current_program_root: ".agent/programs"
  phase_filename_pattern: "PHASE[0-9][0-9]_<name>.md"
  new_program_first_phase: "PHASE01"
  replaced_program_policy: "archive evidence under docs/history/programs and do not keep competing active truth"

work_modes:
  branch_prefix: "codex/"
  task_isolation_unit: "worktree + branch"
  main_thread_can_self_execute: true
  main_thread_can_delegate: true
  coordinator_role: "scope, contract freeze, conflict resolution, integrated verification, merge, and evidence reporting"
  require_disjoint_write_scope_for_parallel_tasks: true
  require_commit_and_push_before_merge: true

architecture_directory_contract:
  formal_files:
    - "docs/architecture/README.md"
    - "docs/architecture/architecture.md"
    - "docs/architecture/architecture-views.md"
    - "docs/architecture/architecture.html"
  mirror_files:
    - ".agent/architecture/README.md"
    - ".agent/architecture/architecture.md"
    - ".agent/architecture/architecture-views.md"
    - ".agent/architecture/architecture.html"
  formal_design_fact_count: "11 module documents + architecture.md + architecture.html"
  visual_source_role: "architecture-views.md is the Mermaid source for architecture.html, not a second textual architecture"
  forbidden_content:
    - "module-specific second architecture documents"
    - "production readiness"
    - "ADR"
    - "program plan"
    - "repo ownership matrix"

module_document_contract:
  formal_index: "docs/modules/README.md"
  agent_index: ".agent/modules/README.md"
  status_truth: "docs/status/production-readiness.md"
  mirror_policy: "all eleven module formal documents and mirrors must be byte-identical"
  owner_precedence: "the owning module document is canonical for domain objects, state machines, failures, persistence, and tests"

  product_surface:
    formal: "docs/modules/01-product-surface.md"
    mirror: ".agent/modules/01-product-surface.md"
    verifier: "python tools/scripts/verify_product_surface_target_protocols.py"
    test: "pytest -q tests/repo/test_product_surface_target_protocols.py -p no:cacheprovider"

  input_document_ingestion:
    formal: "docs/modules/02-input-document-ingestion.md"
    mirror: ".agent/modules/02-input-document-ingestion.md"
    verifier: "python tools/scripts/verify_architecture_document_set.py"
    test: "pytest -q tests/repo/test_architecture_document_set.py -p no:cacheprovider"

  knowledge_agentic_graphrag:
    formal: "docs/modules/03-knowledge-agentic-graphrag.md"
    mirror: ".agent/modules/03-knowledge-agentic-graphrag.md"
    verifier: "python tools/scripts/verify_architecture_document_set.py"
    test: "pytest -q tests/repo/test_architecture_document_set.py -p no:cacheprovider"

  model_gateway:
    formal: "docs/modules/04-model-gateway.md"
    mirror: ".agent/modules/04-model-gateway.md"
    target_only: true
    verifier: "python tools/scripts/verify_model_gateway_target_protocols.py"
    test: "pytest -q tests/repo/test_model_gateway_target_protocols.py -p no:cacheprovider"

  memory_context:
    formal: "docs/modules/05-memory-context.md"
    mirror: ".agent/modules/05-memory-context.md"
    verifier: "python tools/scripts/verify_memory_context_target_protocols.py"
    test: "pytest -q tests/repo/test_memory_context_target_protocols.py -p no:cacheprovider"

  agent_core:
    formal: "docs/modules/06-agent-core-planning-control.md"
    mirror: ".agent/modules/06-agent-core-planning-control.md"
    target_only: true
    execution_plan_root: ".agent/programs"
    verifier: "python tools/scripts/verify_agent_core_target_protocols.py"
    test: "pytest -q tests/repo/test_agent_core_target_protocols.py -p no:cacheprovider"

  capability_skill:
    formal: "docs/modules/07-capability-skill.md"
    mirror: ".agent/modules/07-capability-skill.md"
    verifier: "python tools/scripts/verify_capability_skill_target_protocols.py"
    test: "pytest -q tests/repo/test_capability_skill_target_protocols.py -p no:cacheprovider"

  tool_runtime:
    formal: "docs/modules/08-tool-runtime.md"
    mirror: ".agent/modules/08-tool-runtime.md"
    verifier: "python tools/scripts/verify_tool_runtime_target_protocols.py"
    test: "pytest -q tests/repo/test_tool_runtime_target_protocols.py -p no:cacheprovider"

  security:
    formal: "docs/modules/09-security.md"
    mirror: ".agent/modules/09-security.md"
    verifier: "python tools/scripts/verify_security_target_protocols.py"
    test: "pytest -q tests/repo/test_security_target_protocols.py -p no:cacheprovider"

  observability_eval:
    formal: "docs/modules/10-observability-eval.md"
    mirror: ".agent/modules/10-observability-eval.md"
    verifier: "python tools/scripts/verify_observability_eval_target_protocols.py"
    test: "pytest -q tests/repo/test_observability_eval_target_protocols.py -p no:cacheprovider"

  infrastructure:
    formal: "docs/modules/11-infrastructure.md"
    mirror: ".agent/modules/11-infrastructure.md"
    verifier: "python tools/scripts/verify_infrastructure_target_protocols.py"
    test: "pytest -q tests/repo/test_infrastructure_target_protocols.py -p no:cacheprovider"

shared_contracts:
  adr: "docs/decisions/0003-wave1-cross-module-contract-freeze.md"
  registry: "docs/governance/wave1-cross-module-contract-registry.md"
  status: "CONFIRMED_TARGET"
  verifier: "python tools/scripts/verify_wave1_contract_freeze.py"
  test: "pytest -q tests/repo/test_wave1_contract_freeze.py -p no:cacheprovider"

skill_routes:
  - name: "architecture-and-document-governance"
    match:
      paths:
        - "README.md"
        - "docs/**"
        - "AGENTS.md"
        - ".agent/**"
    skills:
      - ".agent/references/project-map.md"
      - ".agent/references/task-routing.md"
      - ".agent/references/workflow.md"
      - ".agent/references/docs-map.md"
      - ".agent/references/architecture-docs-map.md"
      - ".agent/references/documentation-governance.md"
      - ".agent/references/architecture-update-policy.md"
      - ".agent/references/current-target-future-rules.md"
      - ".agent/references/verification-map.md"
      - ".agent/references/known-pitfalls.md"
      - ".agent/references/zuno-repo-hygiene.md"
    templates:
      - ".agent/templates/requirement-intake.md"
      - ".agent/templates/readonly-audit-prompt.md"
      - ".agent/templates/phase-plan.md"
      - ".agent/templates/phase-closure-report.md"
      - ".agent/templates/spec-coding-checklist.md"
      - ".agent/templates/architecture-doc-template.md"
      - ".agent/templates/verification-report-template.md"
    docs_sync:
      - "AGENTS.md"
      - "docs/architecture/README.md"
      - "docs/architecture/architecture.md"
      - "docs/architecture/architecture-views.md"
      - "docs/architecture/architecture.html"
      - "docs/modules/README.md"
      - "docs/modules/01-product-surface.md"
      - "docs/modules/02-input-document-ingestion.md"
      - "docs/modules/03-knowledge-agentic-graphrag.md"
      - "docs/modules/04-model-gateway.md"
      - "docs/modules/05-memory-context.md"
      - "docs/modules/06-agent-core-planning-control.md"
      - "docs/modules/07-capability-skill.md"
      - "docs/modules/08-tool-runtime.md"
      - "docs/modules/09-security.md"
      - "docs/modules/10-observability-eval.md"
      - "docs/modules/11-infrastructure.md"
      - "docs/status/production-readiness.md"
      - "docs/decisions/"
      - "docs/governance/"
      - ".agent/architecture/"
      - ".agent/modules/"
      - ".agent/references/docs-map.md"
      - ".agent/system.yaml"
    verify:
      - "git diff --check"
      - "python tools/scripts/verify_architecture_document_set.py"
      - "python tools/agent/render_architecture.py --check"
      - "python tools/scripts/verify_wave1_contract_freeze.py"
      - "python tools/scripts/verify_docs_entrypoints.py"
      - "python .agent/scripts/verify_agent_system.py"
      - "python .agent/scripts/verify_doc_boundaries.py"

  - name: "backend-agent-runtime"
    match:
      paths:
        - "src/backend/zuno/agent/**"
        - "src/backend/zuno/core/agents/**"
    docs_sync:
      - "docs/modules/06-agent-core-planning-control.md"
      - "docs/modules/04-model-gateway.md"
      - "docs/modules/05-memory-context.md"
      - "docs/modules/07-capability-skill.md"
      - "docs/modules/08-tool-runtime.md"
    verify:
      - "python tools/scripts/verify_agent_core_target_protocols.py"
      - "pytest -q tests/repo/test_agent_core_target_protocols.py -p no:cacheprovider"

  - name: "knowledge-ingestion-memory"
    match:
      paths:
        - "src/backend/zuno/knowledge/**"
        - "src/backend/zuno/memory/**"
        - "src/backend/zuno/services/rag/**"
    docs_sync:
      - "docs/modules/02-input-document-ingestion.md"
      - "docs/modules/03-knowledge-agentic-graphrag.md"
      - "docs/modules/05-memory-context.md"

  - name: "capability-and-tool"
    match:
      paths:
        - "src/backend/zuno/capability/**"
    docs_sync:
      - "docs/modules/07-capability-skill.md"
      - "docs/modules/08-tool-runtime.md"
    verify:
      - "python tools/scripts/verify_capability_skill_target_protocols.py"
      - "python tools/scripts/verify_tool_runtime_target_protocols.py"

  - name: "platform-foundation"
    match:
      paths:
        - "src/backend/zuno/platform/**"
    docs_sync:
      - "docs/modules/04-model-gateway.md"
      - "docs/modules/09-security.md"
      - "docs/modules/10-observability-eval.md"
      - "docs/modules/11-infrastructure.md"
      - "docs/governance/repo-ownership-matrix.md"

stop_conditions:
  - "public API field rename"
  - "database schema change"
  - "dependency upgrade"
  - "security boundary change"
  - "Target behavior promoted to Current without evidence"
  - "architecture principle changed by an implementation task"
