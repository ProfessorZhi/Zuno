version: 1

purpose: "Route Zuno tasks to local skills, templates, docs sync, and verification."

system_identity:
  name: "Zuno Local Agent Skill System"
  bootloader: "AGENTS.md"
  local_skills_root: ".agent/references"
  template_root: ".agent/templates"
  active_program_root: ".agent/programs"
  formal_truth_root: "docs"
  history_root: "docs/history"

program_rules:
  current_program_root: ".agent/programs"
  phase_filename_pattern: "PHASE[0-9][0-9]_<name>.md"
  new_program_first_phase: "PHASE01"
  replaced_program_policy: "remove old active phase files from .agent/programs; archive evidence under docs/history/programs"

work_modes:
  runtime_boundary: "parallel agents are workflow execution helpers; Zuno runtime target remains Single GeneralAgent"
  branch_prefix: "codex/"
  persistent_thread_slots: true
  task_isolation_unit: "worktree + codex branch, not thread title"
  main_thread_can_self_execute: true
  main_thread_can_delegate: true
  prompt_only_is_not_goal_mode: true
  prompt_only_phrase: "提示词目标模式不等于 Codex UI 目标模式"
  hangup_mode:
    main_thread_goal_mode: true
    description: "主线程作为真正的 Codex UI 目标模式端到端执行计划、实现、验证、提交和推送"
    allow_multi_agent_inside_main_thread: true
    verification_owner: "main thread"
  multi_thread_mode:
    coordinator_thread_goal_mode: true
    coordinator_role: "prepare coarse-grained child prompts, branch scopes, acceptance gates, progress tracking, diff review, integrated verification, and merge"
    child_thread_goal_mode: "user-created Codex UI goal mode thread required"
    user_manual_goal_thread_creation: true
    child_threads_are_reusable_slots: true
    require_fresh_or_confirmed_worktree_branch_per_task: true
    prefer_reuse_existing_thread_slots: true
    create_new_threads_when_no_reusable_slot: true
    rename_thread_after_assignment: true
    child_prompt_must_default_multi_agent: true
    thread_prompt_root: ".agent/programs/thread-prompts"
    thread_prompts_separate_from_phase_files: true
    thread_prompts_replace_on_next_plan: true
    cleanup_old_thread_prompts_by_default: true
    archive_thread_prompts_only_when_requested: true
    temporary_thread_execution_plans_default_cleanup: true
    coarse_grained_child_tasks: true
    child_threads_allow_multi_agent: true
    require_disjoint_write_scope: true
    require_commit_and_push_before_merge: true
    merge_owner: "main coordinator thread"

skill_file_contract:
  recommended_sections:
    - "When To Use"
    - "Mental Model"
    - "Current Truth"
    - "Target Direction"
    - "Must Preserve"
    - "Before Editing"
    - "Allowed Changes"
    - "Forbidden Changes"
    - "Common Failure Patterns"
    - "Debug Playbooks"
    - "Focused Tests"
    - "Docs Sync"
    - "Lessons Learned"

template_rules:
  purpose: "execution skeletons only"
  forbidden_content:
    - "project knowledge"
    - "current architecture truth"
    - "target architecture prose"
    - "lessons learned"
    - "debug playbooks"

skill_routes:
  - name: "docs-agent-system-history"
    match:
      paths:
        - "README.md"
        - "docs/**"
        - "AGENTS.md"
        - ".agent/**"
    skills:
      - ".agent/references/task-routing.md"
      - ".agent/references/workflow.md"
      - ".agent/references/docs-map.md"
      - ".agent/references/verification-map.md"
      - ".agent/references/known-pitfalls.md"
    templates:
      - ".agent/templates/requirement-intake.md"
      - ".agent/templates/readonly-audit-prompt.md"
      - ".agent/templates/phase-plan.md"
      - ".agent/templates/phase-closure-report.md"
    docs_sync:
      - "AGENTS.md"
      - ".agent/README.md"
      - ".agent/system.yaml"
      - ".agent/references/README.md"
      - ".agent/references/current-program.md"
      - ".agent/references/docs-map.md"
      - ".agent/references/task-routing.md"
      - ".agent/references/workflow.md"
      - ".agent/references/verification-map.md"
      - ".agent/templates/README.md"
      - ".agent/programs/README.md"
      - ".agent/programs/current.md"
      - ".agent/programs/implementation-roadmap.md"
      - ".agent/programs/closure-checklist.md"
      - "docs/architecture/README.md"
      - "docs/architecture/current-architecture.md"
      - "docs/architecture/target-architecture.md"
      - "docs/architecture/roadmap.md"
    verify:
      - "git diff --check"
      - "python .agent/scripts/verify_agent_system.py"
      - "powershell -NoProfile -ExecutionPolicy Bypass -File .agent/scripts/verify-workflow.ps1"
      - "pytest -q tests/repo/test_agent_system.py -p no:cacheprovider"

  - name: "backend-agent-runtime"
    match:
      paths:
        - "src/backend/zuno/core/agents/**"
        - "src/backend/zuno/agent/**"
        - "src/backend/zuno/services/memory/**"
        - "src/backend/zuno/memory/**"
    skills:
      - "src/backend/zuno/AGENTS.md"
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/code-map.md"
      - ".agent/references/verification-map.md"
    templates:
      - ".agent/templates/spec-coding-checklist.md"
      - ".agent/templates/phase-closure-report.md"
    docs_sync:
      - "docs/architecture/current-architecture.md"
      - "docs/architecture/target-architecture.md"
      - "docs/architecture/roadmap.md"
      - ".agent/references/code-map.md"
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/verification-map.md"
    verify:
      - "pytest -q tests/agent/test_general_agent_project_query_runtime.py"
      - "pytest -q tests/agent/test_generalagent_context_memory_runtime.py"

  - name: "capability-tool-retrieval"
    match:
      paths:
        - "src/backend/zuno/services/application/capabilities/**"
        - "src/backend/zuno/services/capability_registry.py"
        - "src/backend/zuno/capability/**"
    skills:
      - "src/backend/zuno/AGENTS.md"
      - ".agent/references/code-map.md"
      - ".agent/references/verification-map.md"
    templates:
      - ".agent/templates/spec-coding-checklist.md"
    docs_sync:
      - "docs/architecture/current-architecture.md"
      - "docs/architecture/target-architecture.md"
      - ".agent/architecture/near-term/03-capability-tool-retrieval-architecture.md"
      - ".agent/references/code-map.md"
    verify:
      - "pytest -q tests/agent/test_capability_system.py"
      - "pytest -q tests/agent/test_capability_registry.py"

  - name: "knowledge-graphrag-retrieval"
    match:
      paths:
        - "src/backend/zuno/services/rag/**"
        - "src/backend/zuno/services/retrieval/**"
        - "src/backend/zuno/services/graphrag/**"
        - "src/backend/zuno/knowledge/**"
    skills:
      - "src/backend/zuno/AGENTS.md"
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/code-map.md"
      - ".agent/references/verification-map.md"
      - ".agent/references/known-pitfalls.md"
    templates:
      - ".agent/templates/spec-coding-checklist.md"
      - ".agent/templates/phase-closure-report.md"
    docs_sync:
      - "docs/architecture/current-architecture.md"
      - "docs/architecture/target-architecture.md"
      - ".agent/architecture/near-term/04-knowledge-graphrag-retrieval-fusion.md"
      - ".agent/references/runtime-call-chain.md"
      - ".agent/references/verification-map.md"
    verify:
      - "pytest -q tests/retrieval/test_standard_retrieval_composition.py"
      - "pytest -q tests/retrieval/test_enhanced_retrieval_composition.py"
      - "pytest -q tests/retrieval/test_retrieval_mode_semantics.py"

stop_conditions:
  - "public API field rename"
  - "database schema change"
  - "dependency upgrade"
  - "Domain Pack restored as active public mainline"
  - "Target behavior promoted to Current without code and test evidence"
  - "verification requires edits outside the authorized task scope"
